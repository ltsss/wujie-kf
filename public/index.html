<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>無界茶台 - 在线客服</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
      background: #f5f5f5;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .chat-container {
      width: 100%;
      max-width: 420px;
      height: 100vh;
      max-height: 800px;
      background: #fff;
      display: flex;
      flex-direction: column;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    .chat-header {
      background: linear-gradient(135deg, #8B4513 0%, #A0522D 100%);
      color: #fff;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .chat-header .avatar {
      width: 44px;
      height: 44px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }
    .chat-header .info h3 {
      font-size: 16px;
      font-weight: 600;
    }
    .chat-header .info p {
      font-size: 12px;
      opacity: 0.9;
      margin-top: 2px;
    }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      background: #f8f9fa;
    }
    .message {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .message.user {
      flex-direction: row-reverse;
    }
    .message .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .message.bot .avatar { background: #8B4513; }
    .message.user .avatar { background: #4CAF50; }
    .message .content {
      max-width: 70%;
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
    }
    .message.bot .content {
      background: #fff;
      color: #333;
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.1);
    }
    .message.user .content {
      background: #8B4513;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .chat-input {
      padding: 12px 16px;
      background: #fff;
      border-top: 1px solid #eee;
      display: flex;
      gap: 10px;
    }
    .chat-input input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid #ddd;
      border-radius: 24px;
      font-size: 14px;
      outline: none;
    }
    .chat-input input:focus {
      border-color: #8B4513;
    }
    .chat-input button {
      width: 44px;
      height: 44px;
      background: #8B4513;
      color: #fff;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .chat-input button:hover {
      background: #A0522D;
    }
    .chat-input button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    .typing {
      display: flex;
      gap: 4px;
      padding: 12px 16px;
    }
    .typing span {
      width: 8px;
      height: 8px;
      background: #999;
      border-radius: 50%;
      animation: typing 1.4s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typing {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-10px); }
    }
    .welcome-msg {
      text-align: center;
      color: #999;
      font-size: 12px;
      margin: 20px 0;
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <div class="avatar">🍵</div>
      <div class="info">
        <h3>無界茶台客服</h3>
        <p>在线客服为您服务</p>
      </div>
    </div>
    
    <div class="chat-messages" id="messages">
      <div class="welcome-msg">- 今天 -</div>
    </div>
    
    <div class="chat-input">
      <input type="text" id="messageInput" placeholder="请输入您的问题..." maxlength="500">
      <button id="sendBtn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </div>

  <script src="chat.js"></script>
</body>
</html>
