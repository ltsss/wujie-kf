<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>客服后台 - 無界茶台</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      height: 100vh;
      display: flex;
    }
    .sidebar {
      width: 260px;
      background: #fff;
      border-right: 1px solid #e8e8e8;
      display: flex;
      flex-direction: column;
    }
    .sidebar-header {
      padding: 20px;
      border-bottom: 1px solid #e8e8e8;
    }
    .sidebar-header h2 {
      font-size: 18px;
      color: #333;
    }
    .sidebar-header .status {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 8px;
      font-size: 13px;
      color: #666;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #52c41a;
    }
    .conversation-list {
      flex: 1;
      overflow-y: auto;
    }
    .conversation-item {
      padding: 16px 20px;
      border-bottom: 1px solid #f0f0f0;
      cursor: pointer;
      transition: background 0.2s;
    }
    .conversation-item:hover {
      background: #f5f5f5;
    }
    .conversation-item.active {
      background: #e6f7ff;
      border-right: 3px solid #1890ff;
    }
    .conversation-item .name {
      font-size: 14px;
      color: #333;
      font-weight: 500;
    }
    .conversation-item .preview {
      font-size: 12px;
      color: #999;
      margin-top: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .conversation-item .time {
      font-size: 11px;
      color: #bbb;
      margin-top: 4px;
    }
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #fff;
    }
    .chat-header {
      padding: 16px 24px;
      border-bottom: 1px solid #e8e8e8;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .chat-header h3 {
      font-size: 16px;
      color: #333;
    }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      background: #f5f5f5;
    }
    .message {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }
    .message.user {
      flex-direction: row-reverse;
    }
    .message .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #8B4513;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }
    .message.user .avatar {
      background: #4CAF50;
    }
    .message .content {
      max-width: 60%;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.5;
    }
    .message.bot .content {
      background: #fff;
      color: #333;
    }
    .message.user .content {
      background: #8B4513;
      color: #fff;
    }
    .chat-input {
      padding: 16px 24px;
      border-top: 1px solid #e8e8e8;
      display: flex;
      gap: 12px;
    }
    .chat-input textarea {
      flex: 1;
      padding: 12px;
      border: 1px solid #d9d9d9;
      border-radius: 4px;
      resize: none;
      height: 80px;
      font-size: 14px;
    }
    .chat-input button {
      padding: 0 24px;
      background: #8B4513;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    .chat-input button:hover {
      background: #A0522D;
    }
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #999;
    }
    .empty-state-icon {
      font-size: 64px;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="sidebar-header">
      <h2>会话列表</h2>
      <div class="status">
        <span class="status-dot"></span>
        <span>在线</span>
      </div>
    </div>
    <div class="conversation-list" id="conversationList">
      <!-- 会话列表 -->
    </div>
  </div>
  
  <div class="main-content">
    <div class="chat-header">
      <h3 id="chatTitle">请选择会话</h3>
    </div>
    
    <div class="chat-messages" id="messages">
      <div class="empty-state">
        <div class="empty-state-icon">💬</div>
        <p>请选择左侧会话开始聊天</p>
      </div>
    </div>
    
    <div class="chat-input" style="display: none;" id="inputArea">
      <textarea id="messageInput" placeholder="请输入回复内容..."></textarea>
      <button id="sendBtn">发送</button>
    </div>
  </div>

  <script src="admin.js"></script>
</body>
</html>
